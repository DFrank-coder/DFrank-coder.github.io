<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franco Gallegillo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00f5d4;
    --cyan-dim: #00c4aa;
    --cyan-dark: #007a68;
    --bg: #080e14;
    --bg2: #0d1a24;
    --bg3: #112233;
    --card: #0f1e2e;
    --text: #e8f4f0;
    --muted: #6a9aaa;
    --border: rgba(0, 245, 212, 0.15);
    --border-hover: rgba(0, 245, 212, 0.45);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  body {
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,245,212,0.08) 0%, transparent 70%),
      var(--bg);
    display: flex;
    justify-content: center;
    padding: 2.5rem 1rem 4rem;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    margin-bottom: 1.4rem;
  }

  .avatar-ring {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(var(--cyan), var(--cyan-dark), var(--cyan));
    animation: spin 6s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: none;
  }

  .avatar-inner img.loaded { display: block; }
  .avatar-inner span { display: block; }
  .avatar-inner img.loaded + span { display: none; }

  /* Name & bio */
  .name {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.1;
  }

  .name span {
    color: var(--cyan);
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    margin-bottom: 1.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Social icons row */
  .socials {
    display: flex;
    gap: 0.85rem;
    margin-bottom: 2rem;
  }

  .social-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--muted);
    transition: all 0.25s ease;
    cursor: pointer;
  }

  .social-btn:hover {
    border-color: var(--border-hover);
    color: var(--cyan);
    background: rgba(0,245,212,0.07);
    transform: translateY(-2px);
  }

  .social-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  /* Link cards */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,212,0.05), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,245,212,0.08);
  }

  .link-card:hover::before { opacity: 1; }

  .link-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: rgba(0,245,212,0.08);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .link-icon svg {
    width: 22px;
    height: 22px;
    fill: var(--cyan);
  }

  .link-text { flex: 1; }

  .link-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .link-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.67rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .link-arrow {
    color: var(--cyan-dark);
    font-size: 1.1rem;
    transition: transform 0.2s;
  }

  .link-card:hover .link-arrow { transform: translateX(3px); }

  /* Section label */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    color: var(--cyan-dark);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    width: 100%;
    margin-bottom: 0.4rem;
    margin-top: 0.5rem;
    padding-left: 4px;
  }

  /* Footer */
  .footer {
    margin-top: 2.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.5;
    letter-spacing: 0.1em;
  }

  /* Fade in animation */
  .container > * {
    animation: fadeUp 0.5s ease both;
  }
  .avatar-wrap { animation-delay: 0s; }
  .name { animation-delay: 0.08s; }
  .tagline { animation-delay: 0.12s; }
  .socials { animation-delay: 0.18s; }
  .links { animation-delay: 0.24s; }
  .footer { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
